name: zimacompare-v6
services:

  rclone:
    container_name: zimacompare-v6-rclone
    image: rclone/rclone:latest
    restart: unless-stopped
    cpu_shares: 90
    privileged: true
    devices:
      - /dev/fuse
    environment:
      - TZ=Europe/Paris
      - RCLONE_RC_USER=zima
      - RCLONE_RC_PASS=CHANGE-ME-rclone-2026
    command:
      - mount
      - "pcloud:"
      - /mnt/pcloud
      - --allow-other
      - --allow-non-empty
      - --vfs-cache-mode
      - writes
      - --vfs-cache-max-size
      - "2G"
      - --vfs-cache-max-age
      - "1h"
      - --cache-dir
      - /config/rclone/cache
      - --dir-cache-time
      - "30s"
      - --umask
      - "002"
      - --config
      - /config/rclone/rclone.conf
      - --rc
      - --rc-addr
      - ":5572"
    volumes:
      - type: bind
        source: /DATA/AppData/zimacompare-v6/rclone
        target: /config/rclone
      - type: bind
        source: /media/HDD-Storage1
        target: /disks/HDD-Storage1
        read_only: true
      - /DATA/AppData/zimacompare-v6/pcloud-mount:/mnt/pcloud:shared
    networks:
      - zimanet-v6

  backend:
    container_name: zimacompare-v6-backend
    image: ghcr.io/musitoul-blip/zimacompare-backend:v6
    restart: unless-stopped
    cpu_shares: 90
    privileged: true
    depends_on:
      rclone:
        condition: service_started
    environment:
      - PGID=1000
      - PUID=1000
      - TZ=Europe/Paris
      - RCLONE_RC_URL=http://zimacompare-v6-rclone:5572
      - RCLONE_RC_USER=zima
      - RCLONE_RC_PASS=CHANGE-ME-rclone-2026
    volumes:
      - type: bind
        source: /DATA/AppData/zimacompare-v6/data
        target: /app_data
      - type: bind
        source: /DATA/AppData/zimacompare-v6/rclone
        target: /app_rclone
      - /var/run/docker.sock:/var/run/docker.sock
      - type: bind
        source: /media/HDD-Storage1
        target: /disks/HDD-Storage1
      - type: bind
        source: /media/HDD-Storage2
        target: /disks/HDD-Storage2
      - type: bind
        source: /media/SSD_NAS
        target: /disks/SSD_NAS
      - type: bind
        source: /media/Sauvegarde
