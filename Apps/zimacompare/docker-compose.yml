name: zimacompare-v6
services:

  rclone:
    container_name: zimacompare-v6-rclone
    image: rclone/rclone:latest
    restart: unless-stopped
    cpu_shares: 90
    privileged: true
    devices:
      - /dev/fuse
    environment:
      - TZ=Europe/Paris
      - RCLONE_RC_USER=zima
      - RCLONE_RC_PASS=CHANGE-ME-rclone-2026
    command:
      - mount
      - "pcloud:"
      - /mnt/pcloud
      - --allow-other
      - --allow-non-empty
      - --vfs-cache-mode
      - writes
      - --vfs-cache-max-size
      - "2G"
      - --vfs-cache-max-age
      - "1h"
      - --cache-dir
      - /config/rclone/cache
      - --dir-cache-time
      - "30s"
      - --umask
      - "002"
      - --config
      - /config/rclone/rclone.conf
      - --rc
      - --rc-addr
      - ":5572"
    volumes:
      - type: bind
        source: /DATA/AppData/zimacompare-v6/rclone
        target: /config/rclone
      - type: bind
        source: /media/HDD-Storage1
        target: /disks/HDD-Storage1
        read_only: true
      - /DATA/AppData/zimacompare-v6/pcloud-mount:/mnt/pcloud:shared

  backend:
    container_name: zimacompare-v6-backend
    image: ghcr.io/musitoul-blip/zimacompare-backend:v6
    restart: unless-stopped
    cpu_shares: 90
    privileged: true
    depends_on:
      rclone:
        condition: service_started
    environment:
      - PGID=1000
      - PUID=1000
      - TZ=Europe/Paris
      - RCLONE_RC_URL=http://zimacompare-v6-rclone:5572
      - RCLONE_RC_USER=zima
      - RCLONE_RC_PASS=CHANGE-ME-rclone-2026
    volumes:
      - type: bind
        source: /DATA/AppData/zimacompare-v6/data
        target: /app_data
      - type: bind
        source: /DATA/AppData/zimacompare-v6/rclone
        target: /app_rclone
      - /var/run/docker.sock:/var/run/docker.sock
      - type: bind
        source: /media/HDD-Storage1
        target: /disks/HDD-Storage1
      - type: bind
        source: /media/HDD-Storage2
        target: /disks/HDD-Storage2
      - type: bind
        source: /media/SSD_NAS
        target: /disks/SSD_NAS
      - type: bind
        source: /media/Sauvegarde
        target: /disks/Sauvegarde
      - type: bind
        source: /media/Nouveau nom
        target: /disks/Nouveau_nom
      - type: bind
        source: /media/192.168.1.254/Disque 1
        target: /network/NAS_Disque1
      - type: bind
        source: /media/192.168.1.254/Music
        target: /network/NAS_Music
      - type: bind
        source: /media/192.168.1.254/sondage
        target: /network/NAS_Sondage
      - type: bind
        source: /media/192.168.1.254/cam
        target: /network/NAS_Cam
      - /DATA/AppData/zimacompare-v6/pcloud-mount:/network/pCloud:rslave

  frontend:
    container_name: zimacompare-v6-frontend
    image: ghcr.io/musitoul-blip/zimacompare-frontend:v6
    restart: unless-stopped
    cpu_shares: 90
    depends_on:
      backend:
        condition: service_started
    ports:
      - target: 80
        published: "8502"
        protocol: tcp
    privileged: false

x-casaos:
  author: self
  category: File Sync
  hostname: ""
  icon: https://filedn.eu/lXD7ErB2q6Sp19LoIrttSsj/zimacompare/ChatGPT%20Image%2021%20mai%202026%2C%2015_10_31%20v2.PNG
  index: /
  is_uncontrolled: false
  main: frontend
  port_map: "8502"
  scheme: http
  store_app_id: zimacompare
  title:
    custom: ""
    en_us: ZimaCompare v6
  description:
    en_us: Scan, compare and sync files between local disks, NAS and pCloud. Setup wizard included — no SSH required.
  tagline:
    en_us: File sync with pCloud — zero SSH setup
